name: test

# Runs the offline unit tests (test_products_offline.py) on every push to main
# and every PR against main. test_shopify_mcp.py is intentionally NOT run here —
# it requires SHOPIFY_STORE_URL + SHOPIFY_ACCESS_TOKEN against a live store,
# which would mean wiring secrets into a public repo just for a smoke test.
# The offline suite covers the write-path preview logic with a fake client.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest test_products_offline.py -v
