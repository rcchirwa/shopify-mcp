name: test

# Runs all offline unit suites (test_*_offline.py) on every push to main and
# every PR against main. Live-integration tests (test_shopify_mcp.py,
# test_webhooks.py) are intentionally NOT run here — they require
# SHOPIFY_STORE_URL + SHOPIFY_ACCESS_TOKEN against a live store, which would
# mean wiring secrets into a public repo just for a smoke test. The offline
# suites cover the write-path preview/confirm logic with a fake client.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt coverage
      - name: Run offline tests under coverage
        run: coverage run --source=shopify_client,tools,validators -m pytest test_*_offline.py -v
      - name: Enforce 100% coverage
        # `coverage report` prints the per-file table plus TOTAL percentage.
        # `--fail-under=100` exits non-zero if TOTAL drops below 100%, failing
        # the job so a PR that adds uncovered lines can't land on main.
        run: coverage report -m --fail-under=100
