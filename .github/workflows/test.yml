name: test

# Runs all offline unit suites (test_*_offline.py) on every push to main and
# every PR against main. Live-integration tests (test_shopify_mcp.py,
# test_webhooks.py) are intentionally NOT run here — they require
# SHOPIFY_STORE_URL + SHOPIFY_ACCESS_TOKEN against a live store, which would
# mean wiring secrets into a public repo just for a smoke test. The offline
# suites cover the write-path preview/confirm logic with a fake client.
#
# Story 10.40 (SEC-13, SEC-14): every job installs from requirements-dev.lock
# — pinned versions + hashes generated by `pip-compile --generate-hashes`
# from pyproject.toml — instead of resolving pyproject.toml's `>=floor,<cap`
# ranges fresh on every run. `--require-hashes` makes pip refuse any package
# not listed with a matching hash, so a point release outside the lockfile
# (compromised or not) can't slip into the build. The editable install that
# follows uses `--no-deps`: its dependencies are already satisfied by the
# lockfile install, so pip doesn't re-resolve them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned dependencies from lockfile
        run: pip install --require-hashes -r requirements-dev.lock
      - name: Install package (deps already pinned above)
        run: pip install --no-deps -e .
      - name: Run offline tests under coverage
        # Source list lives in pyproject.toml [tool.coverage.run] so local
        # runs and CI measure the same packages. Don't re-specify --source
        # here — it would override the config instead of layering on top.
        run: coverage run -m pytest test_*_offline.py -v
      - name: Enforce 100% coverage
        # `coverage report` prints the per-file table plus TOTAL percentage.
        # `--fail-under=100` exits non-zero if TOTAL drops below 100%, failing
        # the job so a PR that adds uncovered lines can't land on main.
        run: coverage report -m --fail-under=100

  # Separate job from offline-tests so a lint failure and a coverage failure
  # show up as distinct red checks in the PR UI instead of one tangled log.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned dependencies from lockfile
        run: pip install --require-hashes -r requirements-dev.lock
      - name: Install package (deps already pinned above)
        run: pip install --no-deps -e .
      - name: Dependency drift check
        # Fails if the installed env is missing any dependency declared in
        # pyproject.toml (Story 10.37). CI installs fresh so this should always
        # pass here; running it keeps the check itself from bitrotting and
        # guards against a declared dep that can't actually be resolved.
        run: shopify-mcp-check-deps
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy

  # New job (Story 10.40 / SEC-13, SEC-14): fails the PR if any dependency
  # pinned in either project lockfile has a known CVE. This is the CVE gate
  # depcheck.py deliberately doesn't provide — depcheck only checks that a
  # declared distribution is *present*, not whether the version pinned is
  # safe. Audits both requirements.lock and requirements-dev.lock directly
  # (not the installed env) so the check doesn't depend on install order or
  # extras resolution, and so requirements.lock — the file README.md points
  # runtime-only installs at — isn't left outside the CVE gate. pip-audit
  # itself installs from requirements-audit.lock (pinned + hash-verified,
  # same as every other install this story wires into CI) rather than a
  # floating `pip install pip-audit`, so the scanner can't be a supply-chain
  # gap in the job that exists to close one.
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned pip-audit
        run: pip install --require-hashes -r requirements-audit.lock
      - name: pip-audit against requirements.lock
        run: pip-audit -r requirements.lock --strict
      - name: pip-audit against requirements-dev.lock
        run: pip-audit -r requirements-dev.lock --strict
